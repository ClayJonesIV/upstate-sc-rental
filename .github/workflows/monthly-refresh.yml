name: Monthly Rental Market Refresh

on:
  schedule:
    - cron: '0 12 1 * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests anthropic

      # ── Step 1: Pull free public data (Apartment List + Zillow Research) ──
      # No API key needed. Fetches bedroom-level rent CSVs and saves to
      # data/supplemental_latest.json for fetch_data.py to blend in.
      - name: Fetch supplemental data (Apartment List + Zillow Research)
        run: python scripts/fetch_supplemental.py

      # ── Step 2: Fetch RentCast data and blend with supplemental ───────────
      # Reads supplemental_latest.json automatically and merges bedroom rents.
      - name: Fetch RentCast market data (+ blend supplemental)
        env:
          RENTCAST_API_KEY: ${{ secrets.RENTCAST_API_KEY }}
        run: python scripts/fetch_data.py

      # ── Step 3: Calculate MoM / QoQ / YoY trends ─────────────────────────
      - name: Calculate trends (MoM, QoQ, YoY)
        run: python scripts/calculate_trends.py

      # ── Step 4: Generate AI narrative analysis ────────────────────────────
      - name: Generate AI insights
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_insights.py

      # ── Step 5: Build dashboard HTML ──────────────────────────────────────
      - name: Build dashboard HTML
        run: python scripts/build_dashboard.py

      # ── Step 6: Send email report ─────────────────────────────────────────
      - name: Send email report
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_RECIPIENT: ${{ secrets.REPORT_RECIPIENT }}
          GITHUB_PAGES_URL: ${{ secrets.PAGE_URL }}
        run: python scripts/send_email.py

      # ── Step 7: Commit all updated files ──────────────────────────────────
      - name: Commit updated data and dashboard
        run: |
          git config --global user.name "Rental Market Bot"
          git config --global user.email "action@github.com"
          git add data/ docs/
          git diff --staged --quiet || git commit -m "Monthly refresh: $(date +'%B %Y')"
          git pull --rebase origin main
          git push
