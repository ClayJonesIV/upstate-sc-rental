name: Rebuild Dashboard (No API Calls)

on:
  workflow_dispatch:

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests anthropic

      - name: Calculate trends (MoM, QoQ, YoY)
        run: python scripts/calculate_trends.py

      - name: Generate AI insights
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_insights.py

      - name: Build dashboard HTML
        run: python scripts/build_dashboard.py

      - name: Commit updated dashboard
        run: |
          git config --global user.name "Rental Market Bot"
          git config --global user.email "action@github.com"
          git pull --rebase origin main
          git add docs/
          git diff --staged --quiet || git commit -m "Rebuild dashboard: $(date +'%B %Y')"
          git push
